project:
  name: IL4_IL13_scirep
  final_results_source: compact_processed_inputs
  rscript: Rscript

thresholds:
  nominal_p: 0.05
  fold_change: 1.5
  log2_fold_change: 0.5849625007211562
  fdr: 0.05

significance_classes:
  nominal_discovery_mrna_circrna: assay-specific nominal P < 0.05 and absolute fold change >= 1.5
  nominal_discovery_mirna: nominal two-sided Welch-test P < 0.05; prioritization additionally uses directionality, integrated-network relevance, and experimental suitability
  FDR_significant_mrna_circrna: Benjamini-Hochberg FDR < 0.05 and absolute fold change >= 1.5
  FDR_significant_mirna: Benjamini-Hochberg FDR < 0.05
  biologically_prioritized: selected using direction, predicted interaction, biological and fibrosis relevance, and suitability for experimental testing
  experimentally_supported: supported by subsequent functional experiments
  experimentally_not_supported: tested experimentally but did not produce the predicted response

contrasts:
  - IL4_vs_Vehicle
  - IL13_vs_Vehicle

samples:
  vehicle:
    - V_A
    - V_B
    - V_C
  IL4:
    - IL4_A
    - IL4_B
    - IL4_C
  IL13:
    - IL13_A
    - IL13_B
    - IL13_C

mRNA:
  compact_count_matrix: data/processed/mrna/all_counts.xlsx
  differential_expression_table: results/tables/Table_S3_mRNA_differential_expression.tsv
  figures:
    overlap: results/figures/Figure_3A_mRNA_overlap.png
    IL4_volcano: results/figures/Figure_3B_mRNA_IL4_volcano.png
    IL13_volcano: results/figures/Figure_3C_mRNA_IL13_volcano.png
  model: edgeR GLM likelihood-ratio test
  normalization: TMM
  filtering: CPM > 1 in at least two samples
  contrast_direction: Treatment minus Vehicle

miRNA:
  expression_matrix: data/processed/mirna/Expression_Browser_CPM.csv
  differential_expression_table: results/tables/Table_S1_miRNA_differential_expression.tsv
  figures:
    overlap: results/figures/Figure_1A_miRNA_overlap.png
    IL4_volcano: results/figures/Figure_1B_miRNA_IL4_volcano.png
    IL13_volcano: results/figures/Figure_1C_miRNA_IL13_volcano.png
  transformation: log2(CPM + 1)
  test: two-sided Welch t-test
  contrast_direction: Treatment minus Vehicle

circRNA:
  normalized_matrix: data/processed/circrna/CircRNA_normalized_Data_KZ.xlsx
  recovered_original_deg_tables:
    IL4_vs_Vehicle: data/processed/circrna/circRNA_original_IL4_vs_Vehicle_DEG.tsv
    IL13_vs_Vehicle: data/processed/circrna/circRNA_original_IL13_vs_Vehicle_DEG.tsv
  provider_workbook: data/processed/circrna/Differentially_Expressed_CircRNAs_Arraystar_provider.xlsx
  differential_expression_table: results/tables/Table_S2_circRNA_differential_expression.tsv
  figures:
    overlap: results/figures/Figure_2A_circRNA_overlap.png
    IL4_volcano: results/figures/Figure_2B_circRNA_IL4_volcano.png
    IL13_volcano: results/figures/Figure_2C_circRNA_IL13_volcano.png
  final_manuscript_source: recovered original circRNA DEG tables
  internal_check_model: limma empirical Bayes
  input_scale: normalized log2 expression
  additional_log_transform: false
  contrast_direction: Treatment minus Vehicle

enrichment:
  organism: hsapiens
  sources:
    - GO:MF
    - GO:BP
    - GO:CC
    - KEGG
  correction_method: g_SCS
  use_custom_background: true

miRanda:
  version_target: v3.3a
  score_threshold: 140
  mature_mirna_query_sequences: data/processed/miranda_inputs
  target_sequences: data/processed/miranda_inputs/all_3putr_circ.fa.txt
  precomputed_outputs: data/processed/miranda_outputs
  require_mature_mirna_rna_bases: true
  coverage_scope: focused selected fibrosis-related mRNA 3-prime UTR and circRNA target FASTA
  complete_run_status: de novo transcriptome-wide rerun is outside the scope of this release

networks:
  canonical_scope: revised current IL-4/IL-13 fibrosis-focused ceRNA network
  curated_integrated_network: data/processed/network/integrated_ceRNA_network_curated.tsv
  integrated_table: results/tables/Table_S5_integrated_ceRNA_network.tsv
  prioritized_axes_table: results/tables/Table_S6_prioritized_axes_miRanda_scores.tsv
  figures:
    IL4_network: results/figures/Figure_4A_IL4_ceRNA_network.png
    IL13_network: results/figures/Figure_4B_IL13_ceRNA_network.png
    shared_network: results/figures/Figure_4C_shared_ceRNA_network.png
    focused_network: results/figures/Figure_4D_focused_ceRNA_network.png
  note: Curated integrated network TSV is the manuscript Figure 4D source; Figure 4 network panels are reproducible R renderings for review.
